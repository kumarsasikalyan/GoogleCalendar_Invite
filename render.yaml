services:
  - type: web
    name: google-calendar-a2a
    env: python
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT main:app
    envVars:
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false
      - key: CALENDAR_EMAIL
        sync: false
